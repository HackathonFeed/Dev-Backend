# Backend-only Render deploy (if this repo is deployed without Frontend/)
# Dashboard → New → Web Service → connect repo → set Root Directory: (repo root)

services:
  - type: web
    name: hackathonfeed-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENVIRONMENT
        value: production
      - key: PREFER_SUPABASE_REST
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
